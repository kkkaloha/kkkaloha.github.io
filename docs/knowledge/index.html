<!DOCTYPE html>
<html lang="en">
<head><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=livereload" data-no-instant defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库 - kkkaloha - 个人主页</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <a href="http://localhost:1313/" class="logo">kkkaloha - 个人主页</a>
    <nav class="nav">
      <a href="http://localhost:1313/">首页</a>
      <a href="/resumes/" class="admin-only">简历</a>
      <a href="/interviews/">面试</a>
      <a href="/knowledge/">知识库</a>
      <button type="button" class="btn-admin-login" id="adminLoginBtn" aria-label="管理员登录">管理员登录</button>
      <button type="button" class="btn-admin-logout" id="adminLogoutBtn" style="display:none;">退出管理员</button>
    </nav>
  </header>
  <main class="main">
    
<article class="page">
  <h1>知识库</h1>
  <div class="content"><p>编程语言、算法、框架等学习笔记，按分类与标签整理。</p>
</div>
  <div class="knowledge-search-wrap">
    <input type="search" class="knowledge-search" placeholder="搜索标题、分类、标签…" aria-label="搜索知识库">
    <span class="knowledge-search-count" aria-live="polite"></span>
  </div>
  <ul class="list knowledge-list" id="knowledge-list">
    
    <li data-search="react hooks 用法 框架与工具 react hooks 前端">
      <a href="/knowledge/react-hooks/">React Hooks 用法</a>
      <span class="cat">框架与工具</span>
      <span class="tag">react</span><span class="tag">hooks</span><span class="tag">前端</span>
      <span class="meta">2024-01-01</span>
    </li>
    
  </ul>
  <p class="knowledge-no-results" id="knowledge-no-results" hidden>没有匹配的条目</p>
  <script>
    (function() {
      var list = document.getElementById('knowledge-list');
      var input = document.querySelector('.knowledge-search');
      var countEl = document.querySelector('.knowledge-search-count');
      var noResults = document.getElementById('knowledge-no-results');
      if (!list || !input) return;
      var items = list.querySelectorAll('li');
      function update() {
        var q = (input.value || '').trim().toLowerCase();
        var visible = 0;
        for (var i = 0; i < items.length; i++) {
          var li = items[i];
          var show = !q || (li.getAttribute('data-search') || '').indexOf(q) !== -1;
          li.style.display = show ? '' : 'none';
          if (show) visible++;
        }
        noResults.hidden = visible > 0 || !q;
        if (countEl) countEl.textContent = q ? '共 ' + visible + ' 条' : '';
      }
      input.addEventListener('input', update);
      input.addEventListener('keyup', update);
    })();
  </script>
</article>

  </main>

  
  <div class="admin-modal" id="adminModal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle" aria-hidden="true">
    <div class="admin-modal-backdrop" id="adminModalBackdrop"></div>
    <div class="admin-modal-content">
      <h2 class="admin-modal-title" id="adminModalTitle">管理员登录</h2>
      <form class="admin-login-form" id="adminLoginForm">
        <label for="adminPassword" class="admin-form-label">请输入口令</label>
        <input type="password" id="adminPassword" class="admin-form-input" autocomplete="off" placeholder="口令" required>
        <p class="admin-form-error" id="adminFormError" role="alert"></p>
        <div class="admin-form-actions">
          <button type="button" class="admin-btn admin-btn-secondary" id="adminModalCancel">取消</button>
          <button type="submit" class="admin-btn admin-btn-primary">登录</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/admin-auth.js"></script>
</body>
</html>
