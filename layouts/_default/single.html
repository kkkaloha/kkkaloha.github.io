{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}
{{ define "main" }}
<article class="single">
  {{ with .Param "direction" }}<span class="badge">{{ . }}</span>{{ end }}
  <h1>{{ .Title }}</h1>
  {{ with .PublishDate }}<p class="meta">{{ .Format "2006-01-02" }}</p>{{ end }}
  <div class="content">{{ .Content }}</div>
</article>
{{ end }}
